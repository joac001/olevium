name: Dashboard Filter - Month Filter Does Not Show Full Year X-Axis
page: dashboard
page_path: /dashboard
task: Verify that when a specific month is selected, the chart X-axis does NOT erroneously span a full year (365 days), which was the symptom of the filter bug
steps:
  - Log in using ${BUGSTER_USERNAME} and ${BUGSTER_PASSWORD}
  - Navigate to /dashboard
  - Set the "Período" filter to "Mes específico"
  - Set the "Mes" to "Enero" and "Año" to "2026"
  - Set "Agrupar" to "Diario"
  - Look at the "Flujo de ingresos y salidas" chart X-axis
  - Verify the leftmost X-axis label is NOT from January 2025 (a year before the selected month)
  - Verify the leftmost X-axis label starts from "2026-01-01" or similar (first day of January 2026)
  - Verify the rightmost X-axis label is "2026-01-31" or similar (last day of January 2026)
  - Verify that any transaction spike or bar appears near the corresponding date label, not squished to the far right of a year-long axis
  - Now switch "Período" to "Último año" and verify the chart switches back to showing a full 365-day range
expected_result: With "Mes específico → Enero 2026" selected, the X-axis starts at 2026-01-01 and ends at 2026-01-31 (31 labels). There are no dates from 2025 visible. Switching back to "Último año" correctly restores the 365-day view.
