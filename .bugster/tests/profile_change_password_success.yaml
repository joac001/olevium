name: Profile Change Password Success (and Restore)
page: profile
page_path: /profile
task: Change the password and then restore it so other tests can keep using ${BUGSTER_PASSWORD}
steps:
  - Log in with ${BUGSTER_USERNAME} and ${BUGSTER_PASSWORD}
  - Navigate to /profile
  - In "Cambiar contraseña", set a temporary new password (e.g., TempPass123!) using the current password ${BUGSTER_PASSWORD}
  - Submit and verify success feedback for the password change
  - Log out
  - Log back in with the temporary password (TempPass123!)
  - Navigate again to /profile
  - Change the password back to the original ${BUGSTER_PASSWORD} (current = TempPass123!, new = ${BUGSTER_PASSWORD})
  - Submit and verify success feedback, then log out
  - Log in once more with ${BUGSTER_PASSWORD} and access /dashboard to confirm restoration
expected_result: Password can be changed and restored; final state keeps ${BUGSTER_PASSWORD} valid for subsequent tests
