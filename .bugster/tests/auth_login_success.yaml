name: Auth Login Success
page: auth
page_path: /auth
task: Verify an existing user can log in and reach the dashboard
steps:
  - Navigate to /auth
  - Select "Ya tengo cuenta" or the login tab if not already active
  - Enter valid email using ${BUGSTER_USERNAME}
  - Enter valid password using ${BUGSTER_PASSWORD}
  - Click the "Iniciar sesión" button
  - Verify redirect to /dashboard
  - Verify success toast "Sesion iniciada exitosamente" is visible
  - Verify the navigation bar shows the logout button
expected_result: User logs in successfully, lands on /dashboard, and sees the navigation available
