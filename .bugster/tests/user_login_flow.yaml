name: User Login Flow
page: auth
page_path: /auth
task: Test the complete user login flow from landing page to dashboard
steps:
- Navigate to the application home page
- Click the 'Ya tengo cuenta' (I already have an account) button
- Enter valid email address in the email field
- Enter valid password in the password field
- "Click the 'Iniciar sesi\xF3n' (Login) button"
- Verify successful redirect to dashboard page (/dashboard)
- Verify success message 'Sesion iniciada exitosamente' is displayed
- Verify dashboard loads with navigation menu and logout button
- Verify financial summary section is displayed with consolidated balance
expected_result: User successfully logs in and is redirected to dashboard with success
  message and financial summary displayed
