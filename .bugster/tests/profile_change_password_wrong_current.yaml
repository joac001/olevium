name: Profile Change Password Wrong Current
page: profile
page_path: /profile
task: Show clear error when current password is incorrect
steps:
  - Log in using ${BUGSTER_USERNAME} and ${BUGSTER_PASSWORD}
  - Navigate to /profile
  - In "Cambiar contraseña", enter an incorrect current password
  - Enter a valid new password and confirm it
  - Submit the form ("Cambiar contraseña")
  - Verify error feedback states "La contraseña actual no es correcta."
expected_result: Form rejects the change and shows the explicit message for incorrect current password
