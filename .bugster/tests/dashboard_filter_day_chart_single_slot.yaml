name: Dashboard Filter - Day Filter Shows Single Day in Chart
page: dashboard
page_path: /dashboard
task: Verify that when "Día específico" is selected, the chart X-axis shows only that single day and not a full year range
steps:
  - Log in using ${BUGSTER_USERNAME} and ${BUGSTER_PASSWORD}
  - Navigate to /dashboard
  - Set the "Período" filter to "Día específico"
  - Enter or select a specific day that has at least one transaction (e.g., 2026-02-18)
  - Set "Agrupar" to "Diario"
  - Observe the "Flujo de ingresos y salidas" chart
  - Verify the X-axis shows only a single date label corresponding to the selected day
  - Verify the chart does NOT show a 365-day X-axis with the selected day's data on the far right
  - Verify any transaction for that day appears prominently (not as a tiny spike at the far right)
  - Verify the transaction count badge at the top right (e.g., "1 movimientos en el período") matches the actual number of transactions on that day
expected_result: With "Día específico" selected, the chart shows a single X-axis slot for the chosen day. The chart is not a year-long empty timeline. The data point for that day is clearly visible.
